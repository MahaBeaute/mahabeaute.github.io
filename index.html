<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maha Beauté - Salon de Coiffure à La Marsa</title>

<meta name="description" content="Maha Beauté - Salon de coiffure et beauté féminine à La Marsa. Réservation rapide via WhatsApp.">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= BODY ================= */

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:url("background.jpg") no-repeat center center fixed;
    background-size:cover;
    color:#222;
    overflow-x:hidden;
    position:relative;
}

/* overlay */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:var(--overlay);
    backdrop-filter:blur(1px);
    z-index:-1;
}

/* ================= INTRO ================= */

#intro{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#f8dede,#f1caca);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    overflow:hidden;
    animation:introFade 1s ease forwards;
    animation-delay:4.8s;
}

.intro-content{
    text-align:center;
}

.intro-logo{
    width:220px;
    filter:drop-shadow(0 0 20px #f08fc5);
    animation:floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

.intro-content h2{
    font-family:'Playfair Display';
    font-size:42px;
    color:#7a4d4d;
}

.intro-content p{
    letter-spacing:5px;
    color:#8b6b6b;
}

.loading{
    width:220px;
    height:4px;
    background:rgba(0,0,0,0.1);
    border-radius:50px;
    overflow:hidden;
    margin:20px auto;
}

.loading::after{
    content:"";
    display:block;
    width:40%;
    height:100%;
    background:#e61e8c;
    animation:load 2s infinite;
}

@keyframes load{
    0%{transform:translateX(-100%);}
    100%{transform:translateX(250%);}
}

/* ================= PARTICLES ================= */

.particle{
    position:fixed;
    width:6px;
    height:6px;
    background:#ffb6c1;
    border-radius:50%;
    opacity:0.5;
    animation:float 5s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

/* ================= CONTAINER ================= */

.container{
    width:40%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start;
    padding-left:80px;
    text-align:left;
    position:relative;
    z-index:2;
}

/* ================= LOGO ================= */

.logo{
    width:320px;
    margin-bottom:20px;
    filter:drop-shadow(0 0 15px #f08fc5);
}

/* ================= TEXT ================= */

h1{
    font-family:'Playfair Display';
    font-size:72px;
    margin:0;
    line-height:1;
    color:#e61e8c;
}

.subtitle{
    font-size:20px;
    letter-spacing:4px;
    margin-bottom:40px;
    color:#444;
}

.description{
    font-size:22px;
    max-width:500px;
    margin-bottom:35px;
    line-height:1.7;
    color:#333;
}

/* ================= BUTTONS ================= */

.link{
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:12px;
    margin:12px 0;
    padding:18px 28px;
    width:280px;
    border-radius:50px;
    text-decoration:none;
    font-size:18px;
    background:var(--glass);
    color:var(--text);
    backdrop-filter:blur(10px);
    transition:0.3s;
    border:1px solid rgba(255,255,255,0.4);
}

.link:hover{
    transform:translateY(-3px) scale(1.03);
    background:#e6b7c1;
    color:white;
}

.rdv{
    background:linear-gradient(135deg,#ff8cab,#e26d8f);
    color:white;
    border:none;
}

/* ================= DARK BUTTON ================= */

.toggle{
    position:fixed;
    top:20px;
    right:20px;
    background:black;
    color:white;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
    z-index:10000;
}

/* ================= POPUP ================= */

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    max-width:350px;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(12px);
    padding:25px;
    border-radius:25px;
    transition:0.4s;
    box-shadow:0 10px 35px rgba(0,0,0,0.15);
    text-align:center;
    opacity:0;
    visibility:hidden;
    z-index:99999;
}

.popup.active{
    opacity:1;
    visibility:visible;
}

button{
    margin-top:10px;
    padding:12px 20px;
    border:none;
    border-radius:12px;
    background:#d8a7a7;
    color:white;
    cursor:pointer;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

.container{
    width:85%;
    padding-left:25px;
}

.logo{
    width:240px;
}

h1{
    font-size:52px;
}

.description{
    font-size:18px;
}

.link{
    width:100%;
    max-width:300px;
}

}
/* ================= DARK MODE ================= */

:root{
    --text:#222;
    --glass:rgba(255,255,255,0.55);
    --overlay:rgba(255,255,255,0.35);
}

body.dark{
    --text:#fff;
    --glass:rgba(20,20,20,0.45);
    --overlay:rgba(0,0,0,0.45);
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleDark()">🌙</div>

<!-- INTRO -->

<div id="intro">

    <div class="intro-content">
        <img src="logo.png" class="intro-logo">

        <h2>Maha Beauté</h2>

        <p>HAUTE BEAUTÉ • ÉLÉGANCE</p>

        <div class="loading"></div>
    </div>

</div>

<!-- PARTICLES -->

<script>

for(let i=0;i<30;i++){

    let p=document.createElement("div");

    p.className="particle";

    p.style.left=Math.random()*100+"%";

    p.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(p);
}

</script>

<!-- CONTENT -->

<div class="container">

<img src="logo.png" class="logo">

<h1>Maha Beauté</h1>

<div class="subtitle">
Salon de Coiffure & Beauté
</div>

<div class="description">
Révélez votre beauté avec des soins élégants et une expérience luxueuse.
</div>

<a class="link" href="https://www.instagram.com/mahaiheb/" target="_blank">
<i class="fab fa-instagram"></i>
Instagram
</a>

<a class="link" href="https://www.facebook.com/profile.php?id=61589351552928" target="_blank">
<i class="fab fa-facebook"></i>
Facebook
</a>

<a class="link rdv" href="https://wa.me/21652659117?text=Bonjour%20je%20veux%20réserver" target="_blank">
<i class="fab fa-whatsapp"></i>
Prendre RDV
</a>

<a class="link" href="tel:+21652659117">
<i class="fas fa-phone"></i>
Appeler
</a>

<a class="link" href="https://maps.app.goo.gl/5uquD8G81YzD6Z4F7" target="_blank">
<i class="fas fa-location-dot"></i>
Localisation
</a>

<a class="link" href="javascript:void(0)" onclick="openPopup()">
<i class="fas fa-calendar"></i>
Info Réservation
</a>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<h3>Réservation</h3>

<p>Contactez-nous via WhatsApp 💕</p>

<button onclick="closePopup()">Fermer</button>

</div>

<!-- SCRIPT -->

<script>

function openPopup(){
    document.getElementById("popup").classList.add("active");
}

function closePopup(){
    document.getElementById("popup").classList.remove("active");
}

function toggleDark(){
    document.body.classList.toggle("dark");
}

setTimeout(() => {

    const intro=document.getElementById("intro");

    intro.style.opacity="0";

    intro.style.pointerEvents="none";

    setTimeout(() => intro.style.display="none",1000);

},4500);

</script>

</body>
</html>
